<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment</title>
  <!--icons css file-->
  <link rel="stylesheet" href="./css/all.min.css">
  <!---bootstrap css file-->
  <link rel="stylesheet" href="./css/bootstrap.min.css">
  <!---main css main-->
  <link rel="stylesheet" href="./css/style.css">
  <!--Darkmood css-->
  <link rel="stylesheet" href="./CSS/DARKmood.css">
  
</head>



<section id="Appointment">

  <div class="container py-5">
    <div class="row">

      <!-- FORM -->
      <div class="col-md-8">
        <h3>Book Appointment</h3>

        <form id="form">

          <h5 class="mt-3">Patient Details</h5>

          <input class="form-control my-2" id="name" placeholder="Full Name">
          <small class="text-danger" id="err-name"></small>

          <input class="form-control my-2" id="email" placeholder="Email">
          <small class="text-danger" id="err-email"></small>

          <input class="form-control my-2" id="phone" placeholder="Phone">
          <small class="text-danger" id="err-phone"></small>

          <input type="number" class="form-control my-2" id="age" placeholder="Age" min="1" max="120">
          <small class="text-danger" id="err-age"></small>

          <div class="my-2">
            Gender:
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
          </div>
          <small class="text-danger" id="err-gender"></small>

          <textarea class="form-control my-2" id="concern" placeholder="Medical Concern"></textarea>
          <small class="text-danger" id="err-concern"></small>

          <h5 class="mt-4">Appointment Details</h5>

          <input type="date" class="form-control my-2" id="date">
          <small class="text-danger" id="err-date"></small>

          <select class="form-control my-2" id="time">
            <option value="">Select Time</option>
            <option>09:00</option>
            <option>10:00</option>
            <option>11:00</option>
            <option>14:00</option>
            <option>15:00</option>
            <option>16:00</option>
          </select>
          <small class="text-danger" id="err-time"></small>

          <select class="form-control my-2" id="insurance">
            <option value="">Insurance Provider</option>
            <option>AXA</option>
            <option>MetLife</option>
            <option>Cigna</option>
          </select>
          <small class="text-danger" id="err-insurance"></small>

          <button class="btn btn-primary mt-3">Confirm Appointment</button>

        </form>

        <!-- CONFIRMATION -->
        <div id="confirmation" class="mt-4"></div>

      </div>

      <!-- SIDEBAR -->
      <div class="col-md-4">
        <div class="card p-3">
          <h5>Doctor Info</h5>
          <div id="doctorInfo"></div>
        </div>
      </div>

    </div>
  </div>
</section>
<!--End Appointment Booking Form-->

<script src="js/appointment.js"></script>
<script src="./js/main.js"></script>

<script src="./js/bootstrap.bundle.min.js"></script>

</body>

</html>
